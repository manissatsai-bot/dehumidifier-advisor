<script>
/* ============================================================================
 *  後端串接說明  ——  正式上線時，把 API.USE_MOCK 設為 false 即可。
 *
 *  ① POST  /api/recommend
 *     body : { area:Number, roomType:String, budget:String,
 *              purposes:[String], priorities:[String], note:String }
 *     回傳 : { recommendations: Product[] }   // 由後端依加權邏輯排序好的 2~3 款
 *
 *  ② POST  /api/chat
 *     body : { messages:[{role:'user'|'assistant', content:String}],
 *              conditions:Conditions }
 *     回傳 : { reply:String, conditions?:Conditions, recommendations?:Product[] }
 *            // 顧問回覆；若使用者調整了需求，可一併回傳新的 conditions 與 recommendations
 *
 *  Product 結構（前後端共用）：
 *     { id, brand, model, image, capacity(L/日), area(適用坪數), tank(水箱L),
 *       energy('一級'|'二級'|'三級'), noise(dB), price(NT$),
 *       features:[String], pros:[String], cons:[String],
 *       score:Number(0~10), bars:{ dehumidify, efficiency, quiet }(0~100),
 *       reasons:[String] }            // bars / score / reasons 可由後端算好回傳
 * ========================================================================== */

const API = {
  USE_MOCK: false,
  base: '',                       // ← 例如 'http://localhost:3000'

  async recommend(conditions) {
    if (this.USE_MOCK) { await wait(700); return mockRecommend(conditions); }
    const r = await fetch(this.base + '/api/recommend', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(conditions),
    });
    if (!r.ok) throw new Error('recommend failed');
    return (await r.json()).recommendations;
  },

  async chat(messages, conditions) {
    if (this.USE_MOCK) { await wait(650); return mockChat(messages, conditions); }
    const r = await fetch(this.base + '/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, conditions }),
    });
    if (!r.ok) throw new Error('chat failed');
    return await r.json();
  },
};

const wait = (ms) => new Promise((res) => setTimeout(res, ms));

/* ---------------------------- 選項定義 ---------------------------- */
const ROOMS = [
  { id:'living',  label:'客廳 / 起居室', hint:'開放、坪數較大', damp:1.0 },
  { id:'bedroom', label:'主臥 / 臥室',   hint:'重視安靜',       damp:0.95 },
  { id:'study',   label:'次臥 / 書房',   hint:'小空間',         damp:0.9 },
  { id:'bath',    label:'浴室 / 更衣間', hint:'濕氣集中',       damp:1.25 },
  { id:'basement',label:'地下室 / 車庫', hint:'高潮濕、易發霉', damp:1.45 },
  { id:'whole',   label:'開放式整層',    hint:'大坪數連通',     damp:1.15 },
  { id:'storage', label:'儲藏室 / 衣帽間',hint:'怕收藏發霉',    damp:1.1 },
];
const BUDGETS = [
  { id:'b1', label:'5,000 以下',      lo:0,     hi:5000 },
  { id:'b2', label:'5,000–8,000',     lo:5000,  hi:8000 },
  { id:'b3', label:'8,000–12,000',    lo:8000,  hi:12000 },
  { id:'b4', label:'12,000–20,000',   lo:12000, hi:20000 },
  { id:'b5', label:'20,000 以上',     lo:20000, hi:99999 },
  { id:'b0', label:'不設限',          lo:0,     hi:99999 },
];
const PURPOSES = [
  { id:'daily',     label:'日常除濕',     desc:'維持舒適濕度 50–60%' },
  { id:'mold',      label:'防黴抗潮',     desc:'牆角、衣櫃不發霉' },
  { id:'cloth',     label:'衣物乾燥',     desc:'陰雨天室內烘衣' },
  { id:'allergy',   label:'防螨抗過敏',   desc:'過敏體質更友善' },
  { id:'furniture', label:'保護傢俱收藏', desc:'木傢俱、相機、樂器' },
  { id:'heavy',     label:'地下室 / 車庫',desc:'高潮濕重度除濕' },
];
const PRIORITIES = [
  { id:'energy', label:'一級能效省電' },
  { id:'quiet',  label:'低噪音靜音' },
  { id:'tank',   label:'大容量水箱' },
  { id:'drain',  label:'連續排水' },
  { id:'auto',   label:'自動濕度控制' },
  { id:'wifi',   label:'WiFi 智慧連網' },
  { id:'brand',  label:'品牌信賴' },
  { id:'light',  label:'輕巧好移動' },
];

/* ---------------------------- 範例產品庫（正式版改由後端資料庫） ---------------------------- */
const CATALOG = [
  { id:'d250', brand:'淨域', model:'PureZone D250', capacity:25, area:20, tank:5,   energy:'一級', noise:42, price:15800,
    features:['energy','auto','wifi','brand','drain'],
    pros:['25L/日高效除濕，回潮季也壓得住','支援連續排水，免倒水','App 遠端監控與濕度排程'],
    cons:['機身較大，套房略佔空間','價格偏中高'] },
  { id:'c180', brand:'適居', model:'ComfortDry C180', capacity:18, area:14, tank:4, energy:'一級', noise:36, price:11200,
    features:['energy','quiet','auto','brand'],
    pros:['36dB 超靜音，臥室夜間幾乎無感','一級能效，長時間運轉省電','自動濕度偵測，到設定值待機'],
    cons:['無連續排水孔','不支援 App'] },
  { id:'j120', brand:'樂乾', model:'DryJoy J120', capacity:12, area:8, tank:3, energy:'二級', noise:40, price:6990,
    features:['light','auto'],
    pros:['價格親民，小坪數 CP 值高','機身輕巧好移動','操作簡單，長輩也上手'],
    cons:['二級能效，長開較耗電','水箱偏小要常倒'] },
  { id:'s300', brand:'恆穩', model:'SteadyAir S300', capacity:30, area:25, tank:6, energy:'一級', noise:46, price:19800,
    features:['tank','drain','energy','brand','auto'],
    pros:['30L/日，地下室與整層的首選','6L 大水箱＋連續排水雙模式','金屬壓縮機，耐用穩定'],
    cons:['46dB 運轉聲較明顯','體積與重量都大'] },
  { id:'w200', brand:'衣乾淨', model:'ClothDry W200', capacity:20, area:16, tank:4, energy:'一級', noise:44, price:13500,
    features:['cloth','auto','energy','wifi'],
    pros:['專屬烘衣模式，陰雨天衣物快乾','一級能效＋廣角出風','App 預約乾衣時段'],
    cons:['烘衣模式運轉聲較大','機身較高'] },
  { id:'m90', brand:'微氧', model:'MicroAir M90', capacity:9, area:5, tank:2.5, energy:'二級', noise:38, price:4980,
    features:['light','quiet'],
    pros:['套房、書房剛剛好','38dB 安靜，重量僅約 6kg','體積小不佔位'],
    cons:['除濕力有限，回潮季吃力','二級能效'] },
];

/* ---------------------------- 應用狀態 ---------------------------- */
const state = {
  view: 'landing',        // landing | wizard | loading | results
  step: 1,                // 1..5
  conditions: { area: 8, roomType: null, budget: null, purposes: [], priorities: [], note: '' },
  recommendations: [],
  chat: [],               // {role, content}
  chatBusy: false,
};

/* ============================== 工具 ============================== */
function requiredCapacity(area, roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  const damp = room ? room.damp : 1.0;
  return Math.round(area * 0.62 * damp * 10) / 10;   // 概估建議除濕力 L/日
}
function energyScore(e){ return e === '一級' ? 94 : e === '二級' ? 76 : 58; }
function quietScore(db){ return clamp(Math.round((52 - db) / (52 - 34) * 100), 8, 100); }
function dehumScore(cap){ return clamp(Math.round(cap / 30 * 100), 10, 100); }
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
const NT = (n) => 'NT$ ' + n.toLocaleString('en-US');

/* ====================== 前端範例推薦邏輯（正式版由後端 API 回傳） ====================== */
function mockRecommend(c) {
  const need = requiredCapacity(c.area, c.roomType);
  const budget = BUDGETS.find(b => b.id === c.budget) || BUDGETS.find(b=>b.id==='b0');

  const scored = CATALOG.map(p => {
    // 1) 坪數/除濕力契合度
    const ratio = p.capacity / need;
    const fit = ratio >= 1
      ? clamp(1 - (ratio - 1.25) * 0.45, 0.55, 1)   // 過度超規格略扣
      : clamp(ratio * 0.85, 0.2, 0.9);              // 不足較明顯扣分
    // 2) 預算契合度
    const inBudget = p.price <= budget.hi;
    const budgetFit = inBudget ? clamp(1 - Math.max(0, budget.lo - p.price) / 8000, 0.7, 1) : 0.4;
    // 3) 用途契合（地下室/衣物乾燥特別加權）
    let purpose = 0.6;
    if (c.purposes.includes('heavy') && p.capacity >= 22) purpose += 0.25;
    if (c.purposes.includes('cloth') && p.features.includes('cloth')) purpose += 0.25;
    if (c.purposes.includes('mold') && p.energy === '一級') purpose += 0.1;
    if (c.purposes.includes('allergy') && p.features.includes('auto')) purpose += 0.1;
    purpose = clamp(purpose, 0.5, 1);
    // 4) 在意要點契合（命中越多越高）
    const prio = c.priorities.length
      ? c.priorities.filter(id =>
          p.features.includes(id) ||
          (id === 'quiet' && p.noise <= 39) ||
          (id === 'energy' && p.energy === '一級') ||
          (id === 'tank' && p.tank >= 5)
        ).length / c.priorities.length
      : 0.7;

    const score10 = clamp(
      (fit * 0.34 + budgetFit * 0.2 + purpose * 0.22 + prio * 0.24) * 10,
      0, 10
    );

    return {
      ...p,
      score: Math.round(score10 * 10) / 10,
      bars: { dehumidify: dehumScore(p.capacity), efficiency: energyScore(p.energy), quiet: quietScore(p.noise) },
      reasons: buildReasons(p, c, need, inBudget),
      need,
    };
  });

  return scored.sort((a, b) => b.score - a.score).slice(0, 3);
}

function buildReasons(p, c, need, inBudget) {
  const r = [];
  if (p.capacity >= need) r.push(`${p.capacity}L/日 對應你約 ${need}L 的需求，${p.area} 坪適用範圍涵蓋 ${c.area} 坪空間`);
  else r.push(`輕巧取向，適合 ${p.area} 坪內；若回潮季重度除濕可能略吃力`);
  if (c.priorities.includes('quiet') && p.noise <= 39) r.push(`${p.noise}dB 超靜音，臥室與夜間使用安心`);
  if (c.priorities.includes('energy') && p.energy === '一級') r.push('一級能效，長時間運轉電費更省');
  if (c.purposes.includes('cloth') && p.features.includes('cloth')) r.push('內建烘衣模式，陰雨天衣物快乾');
  if (c.purposes.includes('heavy') && p.capacity >= 22) r.push('高除濕力＋穩定壓縮機，地下室／車庫也壓得住');
  if (c.priorities.includes('tank') && p.tank >= 5) r.push(`${p.tank}L 大水箱，減少倒水頻率`);
  if (c.priorities.includes('drain') && p.features.includes('drain')) r.push('支援連續排水，可長時間免顧');
  if (inBudget) r.push(`${NT(p.price)}，落在你的預算範圍內`);
  return r.slice(0, 3);
}

/* ====================== 前端範例顧問對話（正式版由後端 API 回傳） ====================== */
function mockChat(messages, c) {
  const last = messages[messages.length - 1].content;
  const cond = JSON.parse(JSON.stringify(c));
  let changed = false; const notes = [];

  if (/安靜|靜音|吵|噪音|小聲/.test(last)) { if (!cond.priorities.includes('quiet')) { cond.priorities.push('quiet'); changed = true; } notes.push('把「低噪音」加進你的重視項目'); }
  if (/便宜|預算|貴|省錢|划算|低一點/.test(last)) { cond.budget = 'b2'; changed = true; notes.push('把預算調整到 8,000 以內，優先平價選項'); }
  if (/水箱|倒水|排水/.test(last)) { if (!cond.priorities.includes('tank')) { cond.priorities.push('tank'); changed = true; } notes.push('改為偏好大容量水箱／連續排水'); }
  if (/過敏|塵螨|塵蟎|鼻子/.test(last)) { if (!cond.purposes.includes('allergy')) { cond.purposes.push('allergy'); changed = true; } notes.push('納入防螨抗過敏需求'); }
  if (/烘衣|曬衣|衣服|乾衣/.test(last)) { if (!cond.purposes.includes('cloth')) { cond.purposes.push('cloth'); changed = true; } notes.push('加入衣物乾燥用途'); }
  if (/地下室|車庫|發霉|很潮/.test(last)) { if (!cond.purposes.includes('heavy')) { cond.purposes.push('heavy'); changed = true; } notes.push('提高除濕力權重以對應高潮濕空間'); }
  if (/大一點|坪數|更大|空間變/.test(last)) { cond.area = Math.min(30, cond.area + 4); changed = true; notes.push(`空間調整為約 ${cond.area} 坪`); }

  if (changed) {
    const recs = mockRecommend(cond);
    return {
      reply: `了解，已${notes.join('、')}，並重新為你排序推薦。新的首選是「${recs[0].brand} ${recs[0].model}」，你可以看上方更新後的卡片，有需要再跟我說。`,
      conditions: cond, recommendations: recs,
    };
  }
  return {
    reply: '收到～如果你想調整方向，可以告訴我例如：「要更安靜的」「預算再低一點」「水箱大一點」「給過敏體質用」，我會即時幫你重新推薦。',
  };
}

/* ============================================================================
 *                                 畫面渲染
 * ========================================================================== */
const app = () => document.getElementById('app');

function render() {
  const el = app();
  if (state.view === 'landing') el.innerHTML = viewLanding();
  else if (state.view === 'wizard') el.innerHTML = viewWizard();
  else if (state.view === 'loading') el.innerHTML = viewLoading();
  else if (state.view === 'results') el.innerHTML = viewResults();
  window.scrollTo({ top: 0, behavior: 'instant' });
  if (state.view === 'results') requestAnimationFrame(animateBars);
}

/* ----------------------------- 首頁 ----------------------------- */
function viewLanding() {
  return `
  <section class="fade-up">
    <div class="grid lg:grid-cols-[1.05fr_.95fr] gap-8 lg:gap-12 items-center">
      <div>
        <span class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-teal-50 text-teal-700 font-bold text-[13px] mb-5">
          <span class="w-1.5 h-1.5 rounded-full bg-teal"></span>十年家電選購顧問 · 為你的家量身推薦
        </span>
        <h1 class="text-[40px] sm:text-[52px] leading-[1.08] font-black tracking-tight text-ink">
          挑一台<span class="text-teal">剛剛好</span>的<br/>除濕機，不多花一塊錢
        </h1>
        <p class="mt-5 text-[16px] sm:text-[17px] leading-relaxed text-ink-soft max-w-lg">
          回答 3 個小問題，我會依照你的坪數、格局、預算與在意的點，
          精選 2～3 款最合適的型號，附上推薦指數與優缺點比較。
        </p>
        <div class="mt-8 flex flex-wrap items-center gap-3">
          <button onclick="startWizard()" class="group inline-flex items-center gap-2 px-7 py-4 rounded-2xl bg-teal text-white font-extrabold text-[16px] shadow-soft hover:bg-teal-600 active:scale-[.98] transition">
            開始諮詢
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="group-hover:translate-x-0.5 transition"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span class="text-[13px] text-ink-faint">一分鐘為你找到最適合的除濕機</span>

function stepSubtitle(s){
  return ['', '坪數與格局會一起決定建議的除濕力（不同空間的潮濕程度不同）',

}
function stepValid(s){
  const c = state.conditions;
  if (s === 1) return c.area >= 1 && !!c.roomType;
  if (s === 2) return !!c.budget;
  if (s === 3) return c.purposes.length > 0;
  return true;
}
function stepBody(s, c) {
  if (s === 1) {
    const need = requiredCapacity(c.area, c.roomType);
    return `
    <div class="bg-cream-50 rounded-3xl p-6 sm:p-7 border border-cream-200 shadow-card">

      <div class="flex items-end justify-center gap-2 mb-1">

      <input type="range" min="1" max="30" value="${c.area}" class="w-full my-4" oninput="setArea(this.value)" />

          <span class="font-extrabold text-ink text-[16px]">${b.label}</span>

  return `

    <div class="grid sm:grid-cols-2 gap-3">
      ${PURPOSES.map(p=>{const on=c.purposes.includes(p.id);return `

          ${on?checkIcon(14):'<span class="text-ink-faint">＋</span>'}${p.label}

    <textarea oninput="setNote(this.value)" rows="3" placeholder="其他要補充的要點，例如：家裡有過敏兒、偏好日系品牌、希望可以放在嬰兒房整夜開……" class="w-full rounded-2xl border-2 border-cream-200 bg-cream-50 px-4 py-3 text-[15px] text-ink placeholder:text-ink-faint focus:border-teal focus:outline-none resize-none transition">${c.note}</textarea>

function stars(score) {
  const v = score / 2;                       // 轉 5 星
  const pct = clamp(v / 5 * 100, 0, 100);
  const one = (col)=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="${col}"><path d="M12 2.5l2.9 6.3 6.8.7-5.1 4.6 1.4 6.7L12 17.9 5.1 21.3l1.4-6.7L1.4 9.5l6.8-.7L12 2.5Z"/></svg>`;
  return `<span class="relative inline-flex">
    <span class="inline-flex gap-0.5">${one('#ece0cd').repeat(5)}</span>
    <span class="absolute inset-0 inline-flex gap-0.5 overflow-hidden" style="width:${pct}%">${one('#e0a23c').repeat(5)}</span>
  </span>`;
}

function scoreBar(label, val, color) {
  return `<div class="mb-2">
    <div class="flex justify-between text-[12px] font-bold mb-1"><span class="text-ink-soft">${label}</span><span class="text-ink-faint">${val}</span></div>

  </div>`;
}

function getBuyInfo(p) {
  const q = encodeURIComponent((p.brand ? p.brand + ' ' : '') + p.model);
  if (p.momoUrl) return { url: p.momoUrl, label: '立即購買 · momo', external: true };
  const pchomeUrl = (p.platform_urls || {}).PChome;
  if (pchomeUrl) return { url: pchomeUrl, label: '立即購買 · PChome', external: true };
  const shopeeUrl = (p.platform_urls || {}).Shopee;
  if (shopeeUrl) return { url: shopeeUrl, label: '立即購買 · 蝦皮', external: true };
  // 依序嘗試 momo 搜尋、PChome 搜尋、蝦皮搜尋，這裡直接給 Google
  return {
    url: `https://www.google.com/search?q=${encodeURIComponent((p.brand || '') + ' ' + p.model + ' 除濕機 購買')}`,
    label: '搜尋購買連結',
    external: true,
  };
}

      <div id="chatBox" class="chat-scroll px-5 py-5 space-y-3 max-h-[340px] overflow-y-auto">
        ${state.chat.length === 0 ? chatHint() : state.chat.map(bubble).join('')}
        ${state.chatBusy ? typingBubble() : ''}
      </div>

      <div class="px-4 pb-3 pt-1 flex flex-wrap gap-2 border-t border-cream-200/70">
        ${['要更安靜的','預算再低一點','水箱大一點'].map(t=>`
          <button onclick="quickAsk('${t}')" class="px-3 py-1.5 rounded-full bg-cream-100 hover:bg-teal-50 hover:text-teal-700 text-[12.5px] font-bold text-ink-soft border border-cream-200 transition">${t}</button>`).join('')}
      </div>
      <form onsubmit="sendChat(event)" class="flex items-center gap-2 p-3 border-t border-cream-200">
        <input id="chatInput" type="text" autocomplete="off" placeholder="輸入你在意的點，例如：放在嬰兒房想更安靜…" class="flex-1 rounded-2xl border-2 border-cream-200 bg-cream-50 px-4 py-3 text-[15px] text-ink placeholder:text-ink-faint focus:border-teal focus:outline-none transition" />
        <button type="submit" class="grid place-items-center w-12 h-12 rounded-2xl bg-teal text-white hover:bg-teal-600 shadow-soft transition active:scale-95 shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-7 16-2.5-6.5L4 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
        </button>
      </form>
    </div>
  </div>`;
}
function chatHint() {
  return `<div class="text-center py-4">
    <p class="text-[13px] text-ink-faint">嗨，我是你的除濕機顧問 👋<br/>推薦結果還合適嗎？想微調方向都可以跟我說。</p>
  </div>`;
}
function bubble(m) {
  if (m.role === 'user') {
    return `<div class="flex justify-end"><div class="max-w-[80%] px-4 py-2.5 rounded-2xl rounded-br-md bg-teal text-white text-[14px] leading-relaxed font-medium">${escapeHtml(m.content)}</div></div>`;
  }
  return `<div class="flex justify-start gap-2">
    <span class="grid place-items-center w-7 h-7 rounded-full bg-clay text-white shrink-0 mt-0.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3.2C12 3.2 5.5 10 5.5 15a6.5 6.5 0 0 0 13 0c0-5-6.5-11.8-6.5-11.8Z" fill="currentColor"/></svg></span>
    <div class="max-w-[80%] px-4 py-2.5 rounded-2xl rounded-bl-md bg-cream-100 text-ink text-[14px] leading-relaxed">${escapeHtml(m.content)}</div>
  </div>`;
}
function typingBubble() {
  return `<div class="flex justify-start gap-2">
    <span class="grid place-items-center w-7 h-7 rounded-full bg-clay text-white shrink-0 mt-0.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3.2C12 3.2 5.5 10 5.5 15a6.5 6.5 0 0 0 13 0c0-5-6.5-11.8-6.5-11.8Z" fill="currentColor"/></svg></span>
    <div class="px-4 py-3 rounded-2xl rounded-bl-md bg-cream-100 inline-flex gap-1 items-center">
      <span class="dot w-1.5 h-1.5 rounded-full bg-ink-faint"></span><span class="dot w-1.5 h-1.5 rounded-full bg-ink-faint"></span><span class="dot w-1.5 h-1.5 rounded-full bg-ink-faint"></span>
    </div></div>`;
}
function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============================================================================
 *                                  動作
 * ========================================================================== */
function goHome(){ state.view='landing'; render(); }
function startWizard(){ state.view='wizard'; state.step=1; render(); }
function wizBack(){ if(state.step>1){ state.step--; render(); } }
function wizNext(){
  if(!stepValid(state.step)) return;
  if(state.step < 3){ state.step++; render(); }
  else submitWizard();
}
function editConditions(){ state.view='wizard'; state.step=1; render(); }

function setArea(v){
  state.conditions.area = parseInt(v,10);
  const num = document.getElementById('areaNum');
  const hint = document.getElementById('needHint');
  if(num) num.textContent = state.conditions.area;
  if(hint) hint.textContent = requiredCapacity(state.conditions.area, state.conditions.roomType);
  // 更新 range 與 preset 高亮（避免整頁重繪打斷拖曳）
  const r = document.querySelector('input[type=range]'); if(r) r.value = state.conditions.area;
  document.querySelectorAll('[onclick^="setArea("]').forEach(b=>{
    const m = b.getAttribute('onclick').match(/setArea\((\d+)\)/);
    if(m){ const on = parseInt(m[1],10)===state.conditions.area;
      b.className = `px-4 py-2 rounded-full text-[13px] font-bold border transition ${on?'bg-teal text-white border-teal':'bg-cream-50 text-ink-soft border-cream-200 hover:border-teal-400'}`; }
  });
}
function setRoom(id){ state.conditions.roomType=id; render(); }
function setBudget(id){ state.conditions.budget=id; render(); }
function togglePurpose(id){ const a=state.conditions.purposes; const i=a.indexOf(id); i<0?a.push(id):a.splice(i,1); render(); syncNext(); }
function togglePriority(id){ const a=state.conditions.priorities; const i=a.indexOf(id); i<0?a.push(id):a.splice(i,1); render(); }
function setNote(v){ state.conditions.note=v; }
function syncNext(){ /* render 已重繪按鈕狀態 */ }

async function submitWizard(){
  state.view='loading'; render();
  try {
    state.recommendations = await API.recommend(state.conditions);
  } catch(e){
    console.error(e);
    state.recommendations = mockRecommend(state.conditions); // 後端失敗時的保險
  }
  state.chat = [];
  state.view='results'; render();
}

function animateBars(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.barfill[data-w]').forEach(el=>{
      el.style.width = el.getAttribute('data-w') + '%';
    });
  });
}

/* ----------------------------- Chat ----------------------------- */
function quickAsk(t){ const inp=document.getElementById('chatInput'); if(inp){ inp.value=t; } sendMessage(t); }
function sendChat(e){ e.preventDefault(); const inp=document.getElementById('chatInput'); const v=inp.value.trim(); if(!v) return; inp.value=''; sendMessage(v); }

async function sendMessage(text){
  if(state.chatBusy) return;
  state.chat.push({ role:'user', content:text });
  state.chatBusy = true;
  rerenderChat();
  try {
    const res = await API.chat(state.chat, state.conditions);
    state.chatBusy = false;
    state.chat.push({ role:'assistant', content: res.reply });
    if(res.conditions) state.conditions = res.conditions;
    if(res.recommendations){
      state.recommendations = res.recommendations;
      render();                     // 條件/卡片有變 → 整頁重繪
      flashUpdated();
      requestAnimationFrame(animateBars);
    } else {
      rerenderChat();
    }
  } catch(err){
    console.error(err);
    state.chatBusy = false;
    state.chat.push({ role:'assistant', content:'抱歉，連線好像有點狀況，請稍後再試一次。' });
    rerenderChat();
  }
}
function rerenderChat(){
  // 只重繪 chat 區，避免整頁閃動、保留捲動
  const sec = document.querySelector('#app .mt-12');
  if(!sec){ render(); return; }
  sec.outerHTML = chatSection();
  const box = document.getElementById('chatBox');
  if(box) box.scrollTop = box.scrollHeight;
}
function flashUpdated(){
  const t = document.createElement('div');
  t.className = 'fixed left-1/2 -translate-x-1/2 bottom-6 z-50 px-5 py-3 rounded-2xl bg-ink text-white font-bold text-[14px] shadow-soft fade-up';
  t.textContent = '✓ 已根據你的新需求更新推薦';
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 2200);
}

/* ----------------------------- 啟動 ----------------------------- */
render();
</script>
</body>
</html>
